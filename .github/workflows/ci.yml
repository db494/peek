name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - run: echo "hello from lint"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - run: echo "hello from test"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - run: echo "hello from build"
