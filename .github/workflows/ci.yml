name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v6

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - run: echo "hello from test"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - run: echo "hello from build"
